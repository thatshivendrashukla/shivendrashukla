images:
  - id: carousel1
    alt: Bombay Taxi
    title: Bombay Taxi
    description: >-
      A black and yellow taxi on the streets of Mumbai. The city's familiar
      kaali-peeli fleet is as much a part of Bombay's visual character as its
      art deco buildings and seafront.
  - id: carousel2
    alt: A Field in Austria
    title: Austrian Field
    description: >-
      Open countryside in Austria - rolling fields under a wide sky. A quiet
      counterpoint to city life, and one of those views that stops you
      mid-stride.
  - id: carousel3
    alt: Haji Ali Dargah at Sunset
    title: Haji Ali Dargah
    description: >-
      The Haji Ali Dargah at sunset, set against the Mumbai shoreline. The
      shrine appears almost to float on the water at high tide — one of the
      city's most recognisable silhouettes.
  - id: carousel4
    alt: Swiss Alps
    title: Swiss Alps
    description: >-
      A view across the Swiss Alps - snow, rock, and distance layered into a
      single frame. The scale is difficult to convey in a photograph, but worth
      attempting anyway.
