<footer class="site-footer">
  <div class="site-frame">
    <div class="footer-top">
      <div class="footer-links">
        <a
          href="#"
          class="footer-link"
          data-email-encoded="{{ site.email_encoded }}"
        >
          Email
        </a>
        <a
          href="{{ site.linkedin }}"
          class="footer-link"
          target="_blank"
          rel="noopener noreferrer"
        >
          LinkedIn
        </a>
      </div>
      <span class="footer-copy">&copy; {{ 'now' | date: '%Y' }} {{ site.name }}</span>
    </div>

    <p class="footer-notice">
      <strong>Notice: </strong>{{ site.disclaimer }}
    </p>
  </div>
</footer>
