<header class="site-header">
  <nav class="site-nav site-frame" aria-label="Main navigation">
    <ul>
      {% for item in site.data.nav %}
      <li>
        <a
          href="{{ item.path | relative_url }}"
          class="nav-link{% if page.nav == item.id %} nav-link--active{% endif %}"
        >
          {{ item.label }}
        </a>
      </li>
      {% endfor %}
    </ul>
  </nav>
</header>
